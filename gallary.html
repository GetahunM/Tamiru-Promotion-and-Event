<script>
   const photos = [
    'images/stage1.jpg',
    'images/stage3.jpg',
    'images/education7.jpg',
    'images/eeducation4.jpg',
    'images/wed7.jpg'
];

let photoData = [];
let currentIndex = 0;

/* =========================
   INIT GALLERY
========================= */
function initGallery() {
    const pGrid = document.getElementById('photo-grid');

    for (let i = 0; i < 40; i++) {
        let src = photos[i % photos.length];
        photoData.push(src);

        pGrid.innerHTML += `
            <div class="media-item">
                <img src="${src}" onclick="openLightbox(${i})">
            </div>
        `;
    }
}

/* =========================
   SWITCH TAB (PHOTO / VIDEO)
========================= */
function switchTab(type) {
    const photo = document.getElementById('photo-grid');
    const video = document.getElementById('video-grid');
    const btns = document.querySelectorAll('.tab-btn');

    if (type === 'photo') {
        photo.style.display = 'grid';
        video.style.display = 'none';
        btns[0].classList.add('active');
        btns[1].classList.remove('active');
    } else {
        photo.style.display = 'none';
        video.style.display = 'grid';
        btns[1].classList.add('active');
        btns[0].classList.remove('active');
    }
}

/* =========================
   LIGHTBOX
========================= */
function openLightbox(index) {
    currentIndex = index;
    document.getElementById('lb-img').src = photoData[currentIndex];
    document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
}

function changeSlide(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = photoData.length - 1;
    if (currentIndex >= photoData.length) currentIndex = 0;

    document.getElementById('lb-img').src = photoData[currentIndex];
}

/* =========================
   VIDEO PLAY / PAUSE
========================= */
document.addEventListener("click", function (e) {
    if (e.target.tagName === "VIDEO") {
        e.target.paused ? e.target.play() : e.target.pause();
    }
});

/* =========================
   THEME (DARK MODE SYNC)
========================= */
function applyTheme() {
    const theme = localStorage.getItem("theme");

    if (theme === "dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }
}

/* =========================
   SMART PAGE LOAD (NO FLASH + AUTO SCROLL)
========================= */
document.addEventListener("DOMContentLoaded", function () {

    initGallery();
    applyTheme();

    // force scroll to gallery instantly if coming from button
    const goToGallery = () => {
        const target = document.getElementById("photo-grid");
        if (target) {
            target.scrollIntoView({ block: "start", behavior: "auto" });
        }
    };

    if (window.location.hash === "#gallery-section") {
        requestAnimationFrame(() => {
            requestAnimationFrame(goToGallery);
        });
    }
});
</script>
